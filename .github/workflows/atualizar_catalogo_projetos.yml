name: Atualizar Catalogo Projetos

on:
  push:
    paths:
      - 'projetos/**/*.chorty'
  workflow_dispatch:

jobs:
  gerar:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Gerar catalogo
        run: python gerar_catalogo_projetos.py

      - name: Commit e Push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add catalogo_projetos.json
          git diff --staged --quiet || git commit -m "Atualizar catalogo de projetos"
          git push