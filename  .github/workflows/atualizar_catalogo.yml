name: Atualizar Catalogo

on:
  push:
    paths:
      - 'libs/**/*.chorty-lib'
  workflow_dispatch:

jobs:
  gerar:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Gerar catalogo
        run: python gerar_catalogo.py

      - name: Commit e Push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add catalogo_libs.json
          git diff --staged --quiet || git commit -m "Atualizar catalogo automaticamente"
          git push